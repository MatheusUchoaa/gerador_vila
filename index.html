<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Times da Villa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3.0">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <div class="logo-wrap">
                    <img src="img/logo.jpg" alt="Logo Vôlei Villa" class="logo-img">
                </div>
                <h1>Gerador de Times</h1>
                <p class="subtitle">Vôlei da Vila</p>
            </div>
        </header>

        <main class="app-main">
            <!-- Formulário -->
            <section class="card-section" id="form-section">
                <div class="section-header">
                    <h2><i class="bi bi-person-plus"></i> Adicionar Jogador</h2>
                </div>
                <form id="player-form">
                    <input type="hidden" id="player-id" value="">

                    <div class="form-group">
                        <label for="player-name">Nome</label>
                        <input type="text" id="player-name" class="input" placeholder="Nome do jogador" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Nível</label>
                            <div class="chip-group" id="level-chips">
                                <label class="chip"><input type="radio" name="player-level" value="iniciante" required><span>⭐ Iniciante</span></label>
                                <label class="chip"><input type="radio" name="player-level" value="ok"><span>⭐⭐ OK</span></label>
                                <label class="chip"><input type="radio" name="player-level" value="bom"><span>⭐⭐⭐ Bom</span></label>
                                <label class="chip"><input type="radio" name="player-level" value="ótimo"><span>⭐⭐⭐⭐ Ótimo</span></label>
                                <label class="chip"><input type="radio" name="player-level" value="pro"><span>⭐⭐⭐⭐⭐ Pro</span></label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Gênero</label>
                            <div class="chip-group" id="gender-chips">
                                <label class="chip"><input type="radio" name="player-gender" value="masculino" required><span>♂ Masculino</span></label>
                                <label class="chip"><input type="radio" name="player-gender" value="feminino"><span>♀ Feminino</span></label>
                            </div>
                        </div>
                    </div>

                    <div class="form-row tags-row">
                        <label class="tag-toggle">
                            <input type="checkbox" id="player-setter">
                            <span class="tag setter-tag"><i class="bi bi-hand-index-thumb"></i> Levantador</span>
                        </label>
                        <label class="tag-toggle">
                            <input type="checkbox" id="player-attacker">
                            <span class="tag attacker-tag"><i class="bi bi-lightning-charge"></i> Atacante</span>
                        </label>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-primary-custom" id="submit-button">
                            <i class="bi bi-plus-lg"></i> Adicionar
                        </button>
                        <button type="button" class="btn-ghost" id="cancel-edit" style="display:none;">
                            Cancelar
                        </button>
                    </div>
                </form>
            </section>

            <!-- Jogadores -->
            <section class="card-section">
                <div class="section-header">
                    <h2><i class="bi bi-people"></i> Jogadores</h2>
                    <span class="count-badge" id="player-count">0</span>
                </div>

                <!-- Busca -->
                <div class="search-wrap">
                    <i class="bi bi-search search-icon"></i>
                    <input type="text" id="player-search" class="input search-input" placeholder="Buscar jogador..." autocomplete="off">
                    <button type="button" id="clear-search" class="clear-btn" title="Limpar"><i class="bi bi-x-lg"></i></button>
                </div>

                <!-- Banco de jogadores -->
                <div class="bank-section" id="player-database">
                    <div class="bank-header">
                        <h3>Banco de Jogadores</h3>
                        <div class="bank-actions">
                            <button class="btn-icon" id="reload-firebase-players" title="Recarregar"><i class="bi bi-arrow-clockwise"></i></button>
                            <button class="btn-icon" id="toggle-saved-players"><i class="bi bi-chevron-right"></i></button>
                        </div>
                    </div>
                    <div id="saved-players-list" class="saved-players-grid"></div>
                </div>

                <!-- Lista atual -->
                <ul id="player-list" class="player-list"></ul>

                <!-- Lista simples -->
                <div id="simple-players-card" class="simple-card" style="display:none;">
                    <div class="simple-card-header">🏐 Jogadores Selecionados</div>
                    <div id="simple-players-list" class="simple-grid"></div>
                </div>

                <!-- Ações -->
                <div class="actions-group">
                    <button id="generate-team" class="btn-accent">
                        <i class="bi bi-shuffle"></i> Gerar Times
                    </button>
                    <button id="regenerate-team" class="btn-accent" style="display:none;">
                        <i class="bi bi-arrow-repeat"></i> Sortear Novamente
                    </button>
                    <button id="clear-players" class="btn-danger-outline">
                        <i class="bi bi-trash3"></i> Limpar Todos
                    </button>
                </div>

                <!-- Output -->
                <div id="team-output"></div>
            </section>
        </main>

        <footer class="app-footer">
            <p>&copy; 2025 Matheus Uchoa · Vôlei Villa</p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAnalytics } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js';
        import { getDatabase, ref, push, set, get, onValue, update, remove } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyC5tDXJpe-JdC83kd9VE0Tc8V70Dblztu4",
            authDomain: "gerador-times-volei.firebaseapp.com",
            databaseURL: "https://gerador-times-volei-default-rtdb.firebaseio.com",
            projectId: "gerador-times-volei",
            storageBucket: "gerador-times-volei.firebasestorage.app",
            messagingSenderId: "133601686847",
            appId: "1:133601686847:web:9f60913fa7ce7a1dda4f8a",
            measurementId: "G-3QQ5PSND5M"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const database = getDatabase(app);

        window.firebaseApp = app;
        window.firebaseAnalytics = analytics;
        window.firebaseDatabase = database;
        window.firebaseRef = ref;
        window.firebasePush = push;
        window.firebaseSet = set;
        window.firebaseGet = get;
        window.firebaseOnValue = onValue;
        window.firebaseUpdate = update;
        window.firebaseRemove = remove;

        window.firebaseModules = { getDatabase: () => database, ref, set, get, push, onValue, update, remove };
    </script>

    <script src="script.js?v=3.0"></script>
</body>
</html>
